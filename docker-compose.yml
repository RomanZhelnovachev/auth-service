services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  auth-service:
    build: .
    container_name: auth-service
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - .env